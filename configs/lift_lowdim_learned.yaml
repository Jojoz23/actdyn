# Same as lift_lowdim + learned commit head (proposal: auxiliary termination objective).
# Trains commit classifier with labels from expert delta heuristic; eval mode `learned_commit`.
# Train: actdyn-train --config configs/lift_lowdim_learned.yaml --dataset /path/to/low_dim_v15.hdf5
# Eval must use a checkpoint trained with this config (commit_head weights present).

seed: 42

dataset:
  path: datasets/lift/ph/low_dim_v15.hdf5
  obs_keys: []
  filter_key_train: train
  filter_key_val: valid
  val_ratio: 0.1
  normalize_obs: true
  normalize_actions: false

model:
  k_max: 16
  d_model: 256
  nhead: 8
  num_layers: 4
  latent_dim: 32
  dropout: 0.1
  action_loss: l1
  kl_beta: 0.0001
  use_commit_head: true
  commit_loss_weight: 0.15
  commit_label_delta_threshold: 0.12

optim:
  lr: 0.0001
  weight_decay: 0.000001
  grad_clip_norm: 1.0

train:
  device: cuda
  epochs: 50
  batch_size: 256
  val_batch_size: 256
  num_workers: 8
  log_every_steps: 50

eval:
  run_during_training: false
  num_episodes: 20
  max_horizon: 400
  obs_noise_std: 0.0
  obs_noise_seed: 42
  modes:
    - full_chunk
    - receding_horizon
    - dynamic
    - learned_commit

dynamic:
  rule: overlap_disagreement
  k_min: 1
  overlap_window: 4
  overlap_threshold: 0.08
  delta_threshold: 0.12
  uncertainty_threshold: 0.10
  num_uncertainty_samples: 8

logging:
  out_dir: runs/actdyn_lift_learned

checkpoint:
  save_best: true
  save_last: true
